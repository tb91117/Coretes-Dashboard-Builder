<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #475569; stroke-width: 1; rx: 8; }
      .box-api { fill: #0f172a; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-db { fill: #0f172a; stroke: #10b981; stroke-width: 2; rx: 8; }
      .text { fill: #e2e8f0; font-family: system-ui; font-size: 14px; }
      .text-title { fill: #94a3b8; font-size: 11px; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- UI -->
  <rect class="box" x="20" y="160" width="120" height="80"/>
  <text class="text" x="35" y="195">React UI</text>
  <text class="text-title" x="35" y="215">Dashboard</text>
  <text class="text-title" x="35" y="228">Modal · Filters</text>
  
  <!-- API -->
  <rect class="box box-api" x="200" y="140" width="140" height="120"/>
  <text class="text" x="215" y="175">FastAPI</text>
  <text class="text-title" x="215" y="195">/api</text>
  <text class="text-title" x="215" y="210">Planner</text>
  <text class="text-title" x="215" y="225">Mappers</text>
  <text class="text-title" x="215" y="240">Reporting</text>
  
  <!-- Planner -->
  <rect class="box" x="220" y="310" width="100" height="50"/>
  <text class="text" x="235" y="338">Planner Agent</text>
  
  <!-- Mappers -->
  <rect class="box" x="400" y="200" width="90" height="40"/>
  <text class="text" x="415" y="225">Mappers</text>
  
  <!-- DB -->
  <rect class="box box-db" x="400" y="80" width="120" height="60"/>
  <text class="text" x="415" y="110">SQLite</text>
  <text class="text-title" x="415" y="128">campaigns</text>
  
  <!-- Platforms -->
  <rect class="box" x="530" y="180" width="70" height="30"/>
  <text class="text" x="540" y="200">Google</text>
  <rect class="box" x="530" y="220" width="70" height="30"/>
  <text class="text" x="550" y="240">Meta</text>
  <rect class="box" x="530" y="260" width="70" height="30"/>
  <text class="text" x="535" y="280">Amazon</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M 140 200 L 195 200"/>
  <path class="arrow" d="M 340 200 L 395 200"/>
  <path class="arrow" d="M 340 210 L 400 230 L 340 250 L 260 310"/>
  <path class="arrow" d="M 270 260 L 350 90 L 395 110"/>
  <path class="arrow" d="M 490 220 L 525 220"/>
  <path class="arrow" d="M 490 240 L 525 240"/>
  <path class="arrow" d="M 490 260 L 525 260"/>
</svg>
